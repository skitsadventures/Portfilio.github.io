<!DOCTYPE html>
<html>
<head>
    <title>MessyGames Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
</head>

<body style="background:#1e1e1e; display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="background:#2c2c2c; padding:40px; border-radius:10px; width:300px; text-align:center;">
    
    <h2 style="color:white;">Login</h2>
    
    <input id="email" type="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;"><br>
    <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px;"><br>
    
    <button onclick="login()" style="width:100%; padding:10px; background:#00f451; border:none;">Login</button>
    <button onclick="register()" style="width:100%; padding:10px; margin-top:10px;">Register</button>

    <p id="message" style="color:red;"></p>

    <p>Don't have an account? <a href="register.html">Register here</a></p>
</div>

<script type="module">

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBY1fp3MVIubdekbiEiJtCSlJd8_BWE-0s",
  authDomain: "messygamesauth.firebaseapp.com",
  projectId: "messygamesauth",
  storageBucket: "messygamesauth.firebasestorage.app",
  messagingSenderId: "150152569640",
  appId: "1:150152569640:web:9d0ae2a93fe0384f8ae61d",
  measurementId: "G-TWDWWF5TBW"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

window.register = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
            window.location.href = "index.html";
        })
        .catch(error => {
            document.getElementById("message").innerText = error.message;
        });
};

window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
        .then(() => {
            window.location.href = "index.html";
        })
        .catch(error => {
            document.getElementById("message").innerText = error.message;
        });
};

</script>

</body>
</html>
