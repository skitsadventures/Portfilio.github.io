<!DOCTYPE html>
<html>
<head>
    <title>MessyGames Form</title>
</head>
<body>

<?php
// Start session if needed (optional for login later)
session_start();

// CSV file path
$csv_dir = 'data';
$csv_file = $csv_dir . '/users.csv';

// Create data folder if it doesn't exist
if (!file_exists($csv_dir)) {
    mkdir($csv_dir, 0777, true);
}

// Handle form submission
if ($_SERVER['REQUEST_METHOD'] === 'POST') {
    $fname = $_POST['fname'] ?? '';
    $lname = $_POST['lname'] ?? '';

    if ($fname && $lname) {
        // Append new data to CSV
        $fp = fopen($csv_file, 'a'); // 'a' = append
        fputcsv($fp, [$fname, $lname, date('Y-m-d H:i:s')]);
        fclose($fp);

        echo "<p style='color:green;'>Submitted successfully! CSV updated.</p>";
    } else {
        echo "<p style='color:red;'>Please enter both first and last name.</p>";
    }
}
?>

<h1>Submit Your Info</h1>

<form method="POST" action="">
  <label for="fname">First name: </label>
  <input type="text" id="fname" name="fname" required><br><br>
  <label for="lname">Last name: </label>
  <input type="text" id="lname" name="lname" required><br><br>
  <input type="submit" value="Submit">
</form> 

</body>
</html>
