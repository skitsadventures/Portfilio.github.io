<!DOCTYPE html>
<html>
<head>
    <title>MessyGames Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
</head>

<body style="background:#1e1e1e; display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="background:#2c2c2c; padding:40px; border-radius:10px; width:300px; text-align:center;">
    
    <h2 style="color:white;">Login</h2>
    
    <input id="email" type="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;"><br>
    <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px;"><br>
    
    <button onclick="login()" style="width:100%; padding:10px; background:#00f451; border:none;">Login</button>
    <button onclick="register()" style="width:100%; padding:10px; margin-top:10px;">Register</button>

    <p id="message" style="color:red;"></p>

    <p>Don't have an account? <a href="register.html">Register here</a></p>
</div>

<script type="module">

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "PASTE_HERE",
    authDomain: "PASTE_HERE",
    projectId: "PASTE_HERE",
    storageBucket: "PASTE_HERE",
    messagingSenderId: "PASTE_HERE",
    appId: "PASTE_HERE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
            window.location.href = "index.html";
        })
        .catch(error => {
            document.getElementById("message").innerText = error.message;
        });
};

window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
        .then(() => {
            window.location.href = "index.html";
        })
        .catch(error => {
            document.getElementById("message").innerText = error.message;
        });
};

</script>

</body>
</html>
