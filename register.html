<!DOCTYPE html>
<html>
<head>
  <title>Register - MessyGames</title>
</head>
<body>

  <h2>Create Account</h2>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button onclick="register()">Register</button>

  <p id="message"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBY1fp3MVIubdekbiEiJtCSlJd8_BWE-0s",
  authDomain: "messygamesauth.firebaseapp.com",
  projectId: "messygamesauth",
  storageBucket: "messygamesauth.firebasestorage.app",
  messagingSenderId: "150152569640",
  appId: "1:150152569640:web:9d0ae2a93fe0384f8ae61d",
  measurementId: "G-TWDWWF5TBW"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.register = function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          document.getElementById("message").innerText = "Account created!";
          window.location.href = "index.html"; // redirect after register
        })
        .catch((error) => {
          document.getElementById("message").innerText = error.message;
        });
    }
  </script>

</body>
</html>
