<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MessyGames Videos</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #1e1e1e;
        }

        .video-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .video-container {
            position: relative;
            max-width: 900px;
            width: 100%;
            cursor: pointer;
        }

        .video-thumb {
            width: 100%;
            border-radius: 10px;
            display: block;
            transition: 0.3s;
        }

        .video-container:hover .video-thumb {
            opacity: 0.7;
        }

        /* Play button */
        .play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 85px;
    height: 85px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;

    transition: 0.3s;
}

.play-button i {
    font-size: 32px;
    color: white;

    /* REMOVE this line if you had it */
    margin-left: 0;
    line-height: 1;
}

        .video-container:hover .play-button {
            background: rgba(0, 255, 64, 0.8);
            transform: translate(-50%, -50%) scale(1.1);
        }

        video {
            width: 100%;
            max-width: 900px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div><div style="height: 0.7em; background-color: #424242;"></div></div>

    <!-- Header -->
    <div class="HeaderColumn">
        <div class="toolbar">
            <div class="HeaderImage">
                <img src="assets/Logo2.jpg" alt="Profile Image" width="40">
            </div>
            <div class="spacer"></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">Blender</a>
                <a href="Game.html">Games</a>
                <a href="resume.html">Resume</a>
                <a href="WebsiteTemplate.html">Website</a>
            </div>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div><div style="height: 0.7em; background-color: #424242;"></div></div>

    <div id="container">
        <div class="content">

            <!-- Title -->
            <div class="About">
                <b style="font-size: 30px; color: #ffffff; text-align: center; padding-top: 3%">
                    Video Showcase
                </b>
                <hr style="border: 1px solid #00ff40; width: 80%; margin: 20px auto;">
            </div>

            <!-- VIDEO 1 -->
            <div class="AImageSections">
                <div class="video-wrapper">
                    <div class="video-container" data-video="assets/Videos/WebTemp.mp4">
                        <img class="video-thumb" src="assets/WebTemp.png" alt="Video 1">

                        <!-- Play Icon -->
                        <div class="play-button">
                            <i class="fa-solid fa-play"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="About"><hr class="GreenLine"></div>

            <!-- VIDEO 2 -->
            <div class="AImageSections">
                <div class="video-wrapper">
                    <div class="video-container" data-video="assets/Videos/CompanyWebTemp.mp4">
                        <img class="video-thumb" src="assets/Construction.png" alt="Video 2">

                        <!-- Play Icon -->
                        <div class="play-button">
                            <i class="fa-solid fa-play"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="About"><hr class="GreenLine"></div>

        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="spacer"></div>
            <a href="https://www.linkedin.com/in/mack-rubidge-a09948229/">
                <i class="fa-brands fa-linkedin" style="color: black;"></i>
            </a>
            <a href="https://github.com/skitsadventures">
                <i class="fa-brands fa-github" style="color: black;"></i>
            </a>
            <a href="mailto:mackrubidge@gmail.com">
                <i class="fa-solid fa-paper-plane" style="color: black;"></i>
            </a>
        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        document.querySelectorAll(".video-container").forEach(container => {
            container.addEventListener("click", function () {

                const videoSrc = this.getAttribute("data-video");

                const video = document.createElement("video");
                video.controls = true;
                video.autoplay = true;
                video.style.width = "100%";
                video.style.maxWidth = "900px";
                video.style.borderRadius = "10px";

                const source = document.createElement("source");
                source.src = videoSrc;
                source.type = "video/mp4";

                video.appendChild(source);

                this.replaceWith(video);
            });
        });
    </script>

</body>
</html>
